# SLO-Based Alerting Rules
# These alerts fire based on error budgets, not raw thresholds.

groups:
  - name: slo_alerts
    interval: 30s
    rules:
      # === Availability SLO: 99.9% ===
      # Error budget: 0.1% of requests can fail per 30-day window

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) > 0.001
        for: 5m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "Error rate exceeds 0.1% SLO"
          description: "{{ $labels.service }} error rate is {{ $value | humanizePercentage }} (threshold: 0.1%)"

      - alert: ErrorBudgetBurnRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[1h]))
            /
            sum(rate(http_requests_total[1h]))
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "Error budget burn rate is high"
          description: "At current rate, 30-day error budget will be exhausted in {{ $value | humanize }} hours"

      # === Latency SLO: 99th percentile < 500ms ===

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(http_duration_seconds_bucket[5m])) by (le, service))
          > 0.5
        for: 5m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "P99 latency exceeds 500ms"
          description: "{{ $labels.service }} P99 latency is {{ $value | humanizeDuration }}"

      - alert: HighLatencyP50
        expr: |
          histogram_quantile(0.50, sum(rate(http_duration_seconds_bucket[5m])) by (le, service))
          > 0.2
        for: 10m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "Median latency exceeds 200ms"
          description: "{{ $labels.service }} P50 latency is {{ $value | humanizeDuration }}"

  - name: infrastructure_alerts
    rules:
      # === Pod Health ===

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"

      - alert: PodNotReady
        expr: kube_pod_status_ready{condition="false"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} has been not ready for 10 minutes"

      # === Resource Usage ===

      - alert: HighCPUUsage
        expr: |
          (sum(rate(container_cpu_usage_seconds_total[5m])) by (pod)
          /
          sum(kube_pod_container_resource_limits{resource="cpu"}) by (pod))
          > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} CPU usage above 85%"

      - alert: HighMemoryUsage
        expr: |
          (sum(container_memory_working_set_bytes) by (pod)
          /
          sum(kube_pod_container_resource_limits{resource="memory"}) by (pod))
          > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} memory usage above 85%"

      # === Database ===

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool is 80% exhausted"

      - alert: DatabaseSlowQueries
        expr: rate(pg_stat_statements_mean_exec_time_seconds[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected (avg > 1s)"
